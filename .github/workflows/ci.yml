
name: Full CI
on:
  push:
    branches:
      - main
      - dev
  pull_request:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs_build:
    name: Build docs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build:ci

  doc_tests:
    name: Test and update notebooks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: docs_build
    environment: docs-deploy
    permissions:
      contents: read # checkout
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@2ddd2b9cb38ad8efd50337e8ab201519a34c9f24 # v7.1.1
        with:
          python-version: "3.13"

      - name: Install Python deps
        run: uv sync --all-extras

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node deps
        run: npm ci

      - name: Run notebook tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OVERWRITE_NB: ${{ github.ref == 'refs/heads/main' && '1' || '0' }}
        run: uv run pytest tests/test_docs_nb.py -v --tb=short

      - name: Regenerate .mdx from updated notebooks (main only)
        if: github.ref == 'refs/heads/main'
        run: node scripts/convert-notebooks.mjs

      - name: Generate app token (main only)
        if: github.ref == 'refs/heads/main'
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Commit updated notebooks and docs (main only)
        if: github.ref == 'refs/heads/main'
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/docs/oss/checks/
          if ! git diff --staged --quiet; then
            git commit -m "chore: update notebook outputs and regenerate mdx [skip ci]"
            git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${REPO}.git"
            git push
          fi
