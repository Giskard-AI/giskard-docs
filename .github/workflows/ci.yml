
name: Full CI
on:
  push:
    branches:
      - main
      - dev
  pull_request:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs_build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build:ci

  doc_tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: docs_build
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@2ddd2b9cb38ad8efd50337e8ab201519a34c9f24 # v7.1.1
        with:
          python-version: "3.13"

      - name: Install Python deps
        run: uv sync --all-extras

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node deps
        run: npm ci

      - name: Run notebook tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OVERWRITE_NB: ${{ github.ref == 'refs/heads/main' && '1' || '0' }}
        run: uv run pytest tests/test_docs_nb.py -v --tb=short

      - name: Regenerate .mdx from updated notebooks (main only)
        if: github.ref == 'refs/heads/main'
        run: node scripts/convert-notebooks.mjs

      - name: Commit updated notebooks and docs (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/docs/oss/checks/
          git diff --staged --quiet || git commit -m "chore: update notebook outputs and regenerate mdx [skip ci]"
          git push
