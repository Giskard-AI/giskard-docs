
name: Full CI
on:
  push:
    branches:
      - main
      - dev
  pull_request:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs_build:
    name: Build docs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.16.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm run build:ci

  doc_tests:
    name: Test and update notebooks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: docs_build
    environment: docs-deploy
    permissions:
      contents: read # checkout
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.13"

      - name: Install Python deps
        run: uv sync --all-extras

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.16.0"
          cache: "pnpm"

      - name: Install Node deps
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm run build:ci

      - name: Check MDX tables render
        run: pnpm run test:tables

      - name: Check redirects
        run: pnpm run test:redirects

      - name: Run notebook tests
        env:
          AZURE_AI_API_KEY: ${{ secrets.AZURE_AI_API_KEY }}
          AZURE_AI_ENDPOINT: ${{ secrets.AZURE_AI_API_BASE }}
          OVERWRITE_NB: ${{ github.ref == 'refs/heads/main' && '1' || '0' }}
        run: uv run pytest tests/test_docs_nb.py -v --tb=short

      - name: Regenerate .mdx from updated notebooks (main only)
        if: github.ref == 'refs/heads/main'
        run: node scripts/convert-notebooks.mjs

      - name: Generate app token (main only)
        if: github.ref == 'refs/heads/main'
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Commit updated notebooks and docs (main only)
        if: github.ref == 'refs/heads/main'
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/docs/oss/checks/
          if ! git diff --staged --quiet; then
            git commit -m "chore: update notebook outputs and regenerate mdx [skip ci]"
            git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${REPO}.git"
            git push
          fi
