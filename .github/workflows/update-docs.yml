name: Update docs

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and publish docs
    runs-on: ubuntu-latest
    environment: docs-deploy
    permissions:
      contents: read # checkout only — app token handles the push
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: docs
          fetch-depth: 0
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          git config --global user.name 'giskard-docs-release[bot]'
          git config --global user.email '3190946+giskard-docs-release[bot]@users.noreply.github.com'
          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${REPO}.git"

      - name: Merge latest code
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Validate ref name strictly using git's own rules
          if ! git check-ref-format --branch "$REF_NAME"; then
            echo "Invalid ref name: '$REF_NAME'" >&2
            exit 1
          fi
          git fetch --prune
          # Ensure the remote branch exists under origin
          if ! git show-ref --verify --quiet "refs/remotes/origin/$REF_NAME"; then
            echo "Remote branch 'origin/$REF_NAME' not found" >&2
            exit 1
          fi
          git merge "origin/$REF_NAME"

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@2ddd2b9cb38ad8efd50337e8ab201519a34c9f24 # v7.1.1
        with:
          python-version: "3.12" # giskard 2.18.0 requires python <3.13

      # REQUIRED BY NBSphinx
      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Install deps
        run: make install

      - name: Build the docs
        run: make doc

      - name: Adding built docs
        run: |
          git add -f ./docs
          git commit -m "Docs for latest tag" --allow-empty

      - name: Push to docs
        run: |
          git push origin docs
